name: offline_wallet
description: Offline Digital Cash Wallet — mobile app (Flutter, Android + iOS). Architecture v1.1.
publish_to: "none"
version: 1.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management — Riverpod (ADR-5): compile-safe DI + testable providers.
  flutter_riverpod: ^2.5.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Task 6.5 — premium UI/UX + auth architecture.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5
  animations: ^2.0.11
  material_symbols_icons: ^4.2719.3

  # Task 7 — BLE communication foundation (platform/ble/). flutter_blue_plus
  # (originally sketched below) is central-only and cannot advertise/run a
  # GATT server, which the merchant role needs — universal_ble gives one API
  # for both central (customer) and peripheral (merchant) roles.
  universal_ble: ^2.1.0
  permission_handler: ^11.3.1

  # Task 9 — owner-signed offline transfers (FR-PAY-04, FR-ID-02). Pure-Dart
  # Ed25519 keygen/sign/verify for the device key (core/crypto/).
  cryptography: ^2.9.0

  # Added in their respective feature tasks (kept out of the skeleton so
  # `flutter pub get` stays light and platform plugins land with their code):
  #   drift + sqlcipher_flutter_libs   — encrypted local store (ADR-6, data/)

dev_dependencies:
  flutter_test:
    sdk: flutter
  # On-device networking verification (Task 4.1). SDK-bundled; no new runtime dep.
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # App icon generation only (Task 6.7 follow-up) — not a runtime dependency.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# assets/icon/ is source artwork for the launcher-icon generator below — it
# reads the files directly off disk at codegen time, so they're deliberately
# NOT declared under flutter/assets (that would bundle ~2MB into every build
# for art the running app never loads).
# Regenerate with `dart run flutter_launcher_icons` after editing the source
# artwork in assets/icon/. Source layers match AppColors.heroGradient (navy →
# emerald → cyan) and the brand emerald/navy pair, so the icon reads as the
# same product as the in-app UI.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  # The source foreground already keeps the coin within Android's 66%-diameter
  # safe zone (measured, ~58%); the tool's own 16% default inset on top of that
  # made the mark look too small/lost inside the circular mask. 0 keeps it at
  # the same confident scale as the iOS/master icon.
  adaptive_icon_foreground_inset: 0
